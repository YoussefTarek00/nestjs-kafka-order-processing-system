version: '3.9'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - '29092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 1

  postgres-orders:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: orders_pass
    ports:
      - '5432:5432'
    volumes:
      - orders_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orders_user -d orders_db']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-inventory:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
    ports:
      - '5433:5432'
    volumes:
      - inventory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U inventory_user -d inventory_db']
      interval: 5s
      timeout: 5s
      retries: 5

  orders-service:
    build:
      context: ./orders-service
      dockerfile: Dockerfile
    depends_on:
      postgres-orders:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      PORT: 3000
      DATABASE_HOST: postgres-orders
      DATABASE_PORT: 5432
      DATABASE_NAME: orders_db
      DATABASE_USER: orders_user
      DATABASE_PASSWORD: orders_pass
      KAFKA_BROKER: kafka:29092
      NODE_ENV: development
    ports:
      - '3000:3000'
    restart: on-failure

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    depends_on:
      postgres-inventory:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DATABASE_HOST: postgres-inventory
      DATABASE_PORT: 5432
      DATABASE_NAME: inventory_db
      DATABASE_USER: inventory_user
      DATABASE_PASSWORD: inventory_pass
      KAFKA_BROKER: kafka:29092
      NODE_ENV: development
    restart: on-failure

volumes:
  orders_pgdata:
  inventory_pgdata:
